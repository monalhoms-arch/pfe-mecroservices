<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradients for classes -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.3" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="#f8fafc" rx="10" />
  <text x="450" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f172a">Khidmati System - Class &amp; Database Diagram</text>

  <!-- Class: AccountDB -->
  <g transform="translate(50, 100)" filter="url(#shadow)">
    <rect width="250" height="150" rx="5" fill="white" stroke="#cbd5e1" stroke-width="1" />
    <rect width="250" height="40" rx="5" fill="url(#headerGrad)" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">AccountDB (accounts)</text>
    <g font-family="Courier New, monospace" font-size="12" fill="#334155" transform="translate(10, 60)">
      <text y="0"><tspan font-weight="bold" fill="#0369a1">+ id:</tspan> Integer (PK)</text>
      <text y="20"><tspan font-weight="bold" fill="#0369a1">+ phone_number:</tspan> String (Unique)</text>
      <text y="40"><tspan font-weight="bold" fill="#0369a1">+ account_type:</tspan> String</text>
      <text y="60"><tspan font-weight="bold" fill="#0369a1">+ is_business_whatsapp:</tspan> Boolean</text>
      <text y="80"><tspan font-weight="bold" fill="#0369a1">+ name:</tspan> String</text>
    </g>
  </g>

  <!-- Class: Provider -->
  <g transform="translate(400, 100)" filter="url(#shadow)">
    <rect width="250" height="130" rx="5" fill="white" stroke="#cbd5e1" stroke-width="1" />
    <rect width="250" height="40" rx="5" fill="url(#headerGrad)" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Provider (provider)</text>
    <g font-family="Courier New, monospace" font-size="12" fill="#334155" transform="translate(10, 60)">
      <text y="0"><tspan font-weight="bold" fill="#0369a1">+ id:</tspan> Integer (PK)</text>
      <text y="20"><tspan font-weight="bold" fill="#0369a1">+ full_name:</tspan> String</text>
      <text y="40"><tspan font-weight="bold" fill="#0369a1">+ phone:</tspan> String</text>
      <text y="60"><tspan font-weight="bold" fill="#0369a1">+ job:</tspan> String</text>
    </g>
  </g>

  <!-- Class: Appointment -->
  <g transform="translate(200, 350)" filter="url(#shadow)">
    <rect width="250" height="170" rx="5" fill="white" stroke="#cbd5e1" stroke-width="1" />
    <rect width="250" height="40" rx="5" fill="url(#headerGrad)" />
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Appointment</text>
    <g font-family="Courier New, monospace" font-size="12" fill="#334155" transform="translate(10, 60)">
      <text y="0"><tspan font-weight="bold" fill="#0369a1">+ id:</tspan> Integer (PK)</text>
      <text y="20"><tspan font-weight="bold" fill="#dc2626">+ provider_id:</tspan> Integer (FK)</text>
      <text y="40"><tspan font-weight="bold" fill="#0369a1">+ customer_name:</tspan> String</text>
      <text y="60"><tspan font-weight="bold" fill="#0369a1">+ appointment_datetime:</tspan> DateTime</text>
      <text y="80"><tspan font-weight="bold" fill="#0369a1">+ status:</tspan> String</text>
      <text y="100"><tspan font-weight="bold" fill="#0369a1">+ created_at:</tspan> TIMESTAMP</text>
    </g>
  </g>

  <!-- Class: InvoiceDB -->
  <g transform="translate(550, 350)" filter="url(#shadow)">
    <rect width="280" height="190" rx="5" fill="white" stroke="#cbd5e1" stroke-width="1" />
    <rect width="280" height="40" rx="5" fill="url(#headerGrad)" />
    <text x="140" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">InvoiceDB (invoices)</text>
    <g font-family="Courier New, monospace" font-size="12" fill="#334155" transform="translate(10, 60)">
      <text y="0"><tspan font-weight="bold" fill="#0369a1">+ id:</tspan> Integer (PK)</text>
      <text y="20"><tspan font-weight="bold" fill="#0369a1">+ invoice_code:</tspan> String (Unique)</text>
      <text y="40"><tspan font-weight="bold" fill="#dc2626">+ provider_id:</tspan> Integer (Logic FK)</text>
      <text y="60"><tspan font-weight="bold" fill="#0369a1">+ customer_name:</tspan> String</text>
      <text y="80"><tspan font-weight="bold" fill="#0369a1">+ service_price:</tspan> DECIMAL</text>
      <text y="100"><tspan font-weight="bold" fill="#0369a1">+ pdf_path:</tspan> String</text>
      <text y="120"><tspan font-weight="bold" fill="#0369a1">+ created_at:</tspan> TIMESTAMP</text>
    </g>
  </g>

  <!-- Relationships (Lines & Arrows) -->
  <g stroke="#64748b" stroke-width="2" fill="none">
    <!-- Provider to Appointment -->
    <!-- From Provider Bottom (525, 230) to Appointment Top (325, 350) -->
    <path d="M 525 230 L 525 290 L 325 290 L 325 350" marker-end="url(#arrow)" />
    
    <!-- Provider to Invoice -->
    <!-- From Provider Bottom (525, 230) to Invoice Top (690, 350) -->
    <path d="M 525 230 L 525 290 L 690 290 L 690 350" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  </g>

  <!-- Multiplicity Labels -->
  <text x="530" y="245" font-family="Arial" font-size="12" fill="#64748b">1</text>
  <text x="330" y="340" font-family="Arial" font-size="12" fill="#64748b">0..*</text>
  <text x="695" y="340" font-family="Arial" font-size="12" fill="#64748b">0..*</text>

  <text x="530" y="285" font-family="Arial" font-size="12" fill="#64748b" font-style="italic">has appointments</text>
  <text x="700" y="285" font-family="Arial" font-size="12" fill="#64748b" font-style="italic">has invoices</text>

  <!-- Marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

</svg>
