<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.3" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="#f8fafc" rx="10" />
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f172a">Use Case Diagram (مخطط حالات الاستخدام)</text>

  <!-- System Boundary -->
  <rect x="250" y="80" width="300" height="480" rx="10" fill="white" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" />
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#475569">Khidmati System Boundary</text>

  <!-- Actors -->
  <!-- Customer Actor -->
  <g transform="translate(100, 150)">
    <circle cx="20" cy="10" r="10" fill="#f59e0b" />
    <line x1="20" y1="20" x2="20" y2="40" stroke="#f59e0b" stroke-width="2" />
    <line x1="10" y1="25" x2="30" y2="25" stroke="#f59e0b" stroke-width="2" />
    <line x1="20" y1="40" x2="10" y2="55" stroke="#f59e0b" stroke-width="2" />
    <line x1="20" y1="40" x2="30" y2="55" stroke="#f59e0b" stroke-width="2" />
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#b45309">Customer</text>
  </g>

  <!-- Worker/Provider Actor -->
  <g transform="translate(100, 350)">
    <circle cx="20" cy="10" r="10" fill="#3b82f6" />
    <line x1="20" y1="20" x2="20" y2="40" stroke="#3b82f6" stroke-width="2" />
    <line x1="10" y1="25" x2="30" y2="25" stroke="#3b82f6" stroke-width="2" />
    <line x1="20" y1="40" x2="10" y2="55" stroke="#3b82f6" stroke-width="2" />
    <line x1="20" y1="40" x2="30" y2="55" stroke="#3b82f6" stroke-width="2" />
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1d4ed8">Worker</text>
  </g>

  <!-- Admin Actor -->
  <g transform="translate(650, 150)">
    <circle cx="20" cy="10" r="10" fill="#ef4444" />
    <line x1="20" y1="20" x2="20" y2="40" stroke="#ef4444" stroke-width="2" />
    <line x1="10" y1="25" x2="30" y2="25" stroke="#ef4444" stroke-width="2" />
    <line x1="20" y1="40" x2="10" y2="55" stroke="#ef4444" stroke-width="2" />
    <line x1="20" y1="40" x2="30" y2="55" stroke="#ef4444" stroke-width="2" />
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#b91c1c">Admin</text>
  </g>

  <!-- System (Evo API) Actor -->
  <g transform="translate(650, 350)">
    <rect x="0" y="0" width="40" height="40" rx="5" fill="#10b981" />
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">API</text>
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#047857">Evolution</text>
  </g>


  <!-- Use Cases -->
  <!-- UC1: Request Service -->
  <ellipse cx="400" cy="150" rx="90" ry="25" fill="#fef08a" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#854d0e">Request Service &amp; Book</text>

  <!-- UC2: Generate PDF Invoice -->
  <ellipse cx="400" cy="220" rx="90" ry="25" fill="#bfdbfe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e3a8a">Generate PDF Invoice</text>

  <!-- UC3: Share GPS Link -->
  <ellipse cx="400" cy="290" rx="90" ry="25" fill="#bfdbfe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e3a8a">Share GPS Location Link</text>

  <!-- UC4: System Management -->
  <ellipse cx="400" cy="360" rx="90" ry="25" fill="#fecaca" stroke="#dc2626" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#7f1d1d">Manage Workers &amp; DB</text>

  <!-- UC5: Send Notifications -->
  <ellipse cx="400" cy="430" rx="90" ry="25" fill="#a7f3d0" stroke="#059669" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="435" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#064e3b">Send WhatsApp Alerts</text>

  <!-- UC6: Login OTP -->
  <ellipse cx="400" cy="500" rx="90" ry="25" fill="#e2e8f0" stroke="#64748b" stroke-width="2" filter="url(#shadow)" />
  <text x="400" y="505" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#334155">Login via OTP</text>


  <!-- Connecting Lines -->
  <g stroke="#475569" stroke-width="1.5">
    <!-- Customer Lines -->
    <line x1="140" y1="180" x2="310" y2="150" />
    <line x1="140" y1="180" x2="310" y2="500" />
    
    <!-- Worker Lines -->
    <line x1="140" y1="380" x2="310" y2="220" />
    <line x1="140" y1="380" x2="310" y2="290" />
    <line x1="140" y1="380" x2="310" y2="500" />

    <!-- Admin Lines -->
    <line x1="650" y1="180" x2="490" y2="360" />
    <line x1="650" y1="180" x2="490" y2="500" />

    <!-- Evo API Lines -->
    <line x1="650" y1="380" x2="490" y2="430" />
  </g>

  <!-- Includes / Extends Relationships -->
  <g stroke="#475569" stroke-width="1.5" stroke-dasharray="5,5">
    <line x1="400" y1="175" x2="400" y2="405" marker-end="url(#arrow)" />
    <text x="410" y="200" font-family="Arial" font-size="10" fill="#64748b" transform="rotate(90, 410, 200)">&lt;&lt;includes&gt;&gt;</text>
    
    <line x1="400" y1="245" x2="400" y2="405" marker-end="url(#arrow)" />
    <line x1="400" y1="500" x2="400" y2="455" marker-end="url(#arrow)" />
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>

</svg>
