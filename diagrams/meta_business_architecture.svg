<svg width="850" height="600" viewBox="0 0 850 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="metaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0668E1;stop-opacity:1" /> <!-- Meta Blue -->
      <stop offset="100%" style="stop-color:#004B99;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.3" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="850" height="600" fill="#f8fafc" rx="10" />
  <text x="425" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f172a">Enterprise Architecture: Meta WhatsApp Business API Integration</text>
  <text x="425" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#64748b">(الربط الرسمي مع واجهة ميتا للأعمال - Graph API)</text>

  <!-- META CLOUD INFRASTRUCTURE -->
  <rect x="50" y="100" width="280" height="420" rx="15" fill="url(#metaGrad)" filter="url(#shadow)" />
  <text x="190" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Meta Cloud Infrastructure</text>

  <rect x="70" y="160" width="240" height="50" rx="8" fill="white" fill-opacity="0.1" stroke="white" stroke-dasharray="3,3" />
  <text x="190" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Meta Business Manager</text>
  <text x="190" y="200" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#bfdbfe">(App Verification &amp; Templates)</text>

  <rect x="70" y="240" width="240" height="100" rx="8" fill="white" fill-opacity="0.2" stroke="white" />
  <text x="190" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">WhatsApp Cloud API</text>
  <text x="190" y="285" font-family="Courier New, monospace" font-size="11" text-anchor="middle" fill="#e0f2fe">graph.facebook.com/v19.0/</text>
  <text x="190" y="305" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#e0f2fe">(High Throughput Gateway)</text>

  <rect x="70" y="370" width="240" height="60" rx="8" fill="white" fill-opacity="0.2" stroke="white" />
  <text x="190" y="395" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Webhooks Engine</text>
  <text x="190" y="415" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#e0f2fe">(Pushes events: Delivered, Read, etc)</text>


  <!-- KHIDMATI BACKEND -->
  <rect x="520" y="100" width="280" height="420" rx="15" fill="url(#backendGrad)" filter="url(#shadow)" />
  <text x="660" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Khidmati System</text>

  <rect x="540" y="160" width="240" height="80" rx="8" fill="white" fill-opacity="0.2" stroke="white" />
  <text x="660" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Security &amp; Auth</text>
  <text x="660" y="205" font-family="Courier New, monospace" font-size="11" text-anchor="middle" fill="#a7f3d0">Bearer Token (Permanent)</text>
  <text x="660" y="220" font-family="Courier New, monospace" font-size="11" text-anchor="middle" fill="#a7f3d0">App Secret Proof (SHA256)</text>

  <rect x="540" y="260" width="240" height="80" rx="8" fill="white" fill-opacity="0.2" stroke="white" />
  <text x="660" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Message Dispatcher</text>
  <text x="660" y="305" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#a7f3d0">Formats JSON Payloads</text>
  <text x="660" y="320" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#a7f3d0">(Template Messages / OTPs)</text>

  <rect x="540" y="370" width="240" height="60" rx="8" fill="white" fill-opacity="0.2" stroke="white" />
  <text x="660" y="395" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Webhook Listener</text>
  <text x="660" y="415" font-family="Courier New, monospace" font-size="11" text-anchor="middle" fill="#a7f3d0">POST /api/v1/meta/webhook</text>


  <!-- COMMUNICATION ARROWS -->
  <!-- Send Message -->
  <path d="M 540 290 L 310 290" stroke="#0f172a" stroke-width="3" fill="none" marker-end="url(#arrowDark)" />
  <text x="425" y="280" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0f172a">1. POST Message / Template</text>

  <!-- Webhook Verification -->
  <path d="M 310 400 L 540 400" stroke="#b91c1c" stroke-width="3" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="5,5" />
  <text x="425" y="390" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#b91c1c">2. Webhook Verification (hub.challenge)</text>

  <!-- Event Push -->
  <path d="M 310 420 L 540 420" stroke="#047857" stroke-width="3" fill="none" marker-end="url(#arrowGreen)" />
  <text x="425" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#047857">3. Real-time Event Push (Status)</text>


  <!-- Marker definitions -->
  <defs>
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857" />
    </marker>
  </defs>

</svg>
