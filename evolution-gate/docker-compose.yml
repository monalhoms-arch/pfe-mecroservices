version: '3.8'

services:
  evolution_api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_RESTART_POLICY=always
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=my_evolution_token_123
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://rev:rev_pass@postgres:5432/evolution?sslmode=disable
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - REDIS_DB=0
    depends_on:
      - postgres
      - redis
    networks:
      - evolution_net

  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=rev
      - POSTGRES_PASSWORD=rev_pass
      - POSTGRES_DB=evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution_net

  redis:
    image: redis:alpine
    container_name: evolution_redis
    restart: always
    networks:
      - evolution_net

networks:
  evolution_net:
    driver: bridge

volumes:
  evolution_postgres_data:
